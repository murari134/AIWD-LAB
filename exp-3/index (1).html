<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Better World Tech Conference 2025</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Better World Tech Conference 2025</h1>
    <p>Innovating technology for a smarter, safer, and sustainable future 🌍</p>
</header>

<div class="container">

    <div class="media-section">
        <h2>Event Banner</h2>
        <img src="assets/images/event-banner.jpg" alt="Event Banner">

        <h2>Promotional Video</h2>
        <video controls>
            <source src="assets/videos/promo-video.mp4" type="video/mp4">
        </video>
    </div>

    <div class="form-section">
        <h2>Event Registration Form</h2>
        <form>
            <label>Full Name</label>
            <input type="text" required>

            <label>Email</label>
            <input type="email" required>

            <label>Date of Birth</label>
            <input type="date" required>

            <label>Phone</label>
            <input type="tel" required>

            <label>Event Track</label>
            <select required>
                <option>AI & Machine Learning</option>
                <option>Cyber Security</option>
                <option>Web Development</option>
                <option>Cloud Computing</option>
            </select>

            <input type="submit" value="Register">
        </form>
    </div>

</div>

</body>
</html>
